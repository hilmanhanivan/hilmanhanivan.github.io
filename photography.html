<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photography — Hilman Hanivan</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .page-header {
      margin-bottom: 48px;
      padding-bottom: 36px;
      border-bottom: 1px solid var(--rule);
    }

    .page-header h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 400;
      letter-spacing: -0.025em;
      line-height: 1.12;
      margin-bottom: 14px;
    }

    .page-header h1 em { font-style: italic; color: var(--accent); }

    .page-header p {
      color: var(--ink-muted);
      max-width: 480px;
      font-size: 1.05rem;
      font-style: italic;
    }

    /* Filter bar */
    .filter-bar {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }

    .filter-btn {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 1px solid var(--rule);
      background: none;
      color: var(--ink-muted);
      padding: 6px 14px;
      border-radius: 2px;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
    }

    .filter-btn:hover,
    .filter-btn.on {
      background: var(--accent-light);
      border-color: var(--accent-mid);
      color: var(--accent);
    }

    /* Masonry-style grid */
    .photo-grid {
      columns: 3;
      column-gap: 10px;
      margin-bottom: 32px;
    }

    .photo-item {
      break-inside: avoid;
      margin-bottom: 10px;
      border-radius: 2px;
      overflow: hidden;
      border: 1px solid var(--rule);
      background: var(--accent-light);
      cursor: pointer;
      transition: opacity 0.2s;
      position: relative;
    }

    .photo-item:hover { opacity: 0.88; }

    .photo-placeholder {
      width: 100%;
      display: block;
      background: var(--accent-light);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Different heights for visual interest */
    .photo-item:nth-child(3n+1) .photo-placeholder { aspect-ratio: 3/4; }
    .photo-item:nth-child(3n+2) .photo-placeholder { aspect-ratio: 4/5; }
    .photo-item:nth-child(3n+3) .photo-placeholder { aspect-ratio: 1/1; }

    .photo-placeholder span {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--ink-faint);
      text-align: center;
      line-height: 1.6;
      padding: 16px;
    }

    .photo-caption {
      padding: 10px 12px;
      border-top: 1px solid var(--rule);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .caption-text {
      font-size: 0.82rem;
      color: var(--ink-muted);
      font-style: italic;
    }

    .caption-meta {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--ink-faint);
      letter-spacing: 0.06em;
    }

    /* Info strip */
    .photo-info {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--rule);
      border: 1px solid var(--rule);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 48px;
    }

    .info-cell {
      background: var(--cream);
      padding: 20px 22px;
    }

    .info-label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--ink-faint);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .info-value {
      font-size: 0.95rem;
      color: var(--ink-muted);
    }

    @media (max-width: 600px) {
      .photo-grid { columns: 2; }
      .photo-info { grid-template-columns: 1fr; }
    }

    .lightbox {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.92);
        z-index: 999;
        align-items: center;
        justify-content: center;
        cursor: zoom-out;
    }
    .lightbox.open { display: flex; }
    .lightbox img {
        max-width: 92vw;
        max-height: 92vh;
        object-fit: contain;
        border-radius: 2px;
    }
    .lightbox-close {
        position: fixed;
        top: 20px;
        right: 28px;
        font-family: var(--mono);
        font-size: 13px;
        color: rgba(255,255,255,0.5);
        cursor: pointer;
        letter-spacing: 0.1em;
        text-transform: uppercase;
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="research.html">Project</a></li>
      <li><a href="photography.html" class="active">Imaji</a></li>
    </ul>
  </div>
</nav>

<div class="page">
  <div class="page-header fade-up">
    <h1><em>Imaji</em></h1>
    <p style="font-style: normal;">The world, caught slightly off-guard.</p>
  </div>
  <div class="photo-grid" id="grid"></div>
  <footer>
    <span class="footer-note">All photos © Hilman Hanivan</span>
  </footer>
</div>



<div class="lightbox" id="lightbox">
  <span class="lightbox-close" onclick="closeLightbox()">close</span>
  <img id="lightbox-img" src="" alt="">
</div>

<script>
  fetch('photos.json')
    .then(r => r.json())
    .then(photos => {
      const grid = document.getElementById('grid');
      photos.forEach(p => {
        const div = document.createElement('div');
        div.className = 'photo-item';
        console.log(p.thumb);
        div.innerHTML = `<img src="${p.thumb}" style="width:100%; display:block;">`;
        div.onclick = () => openLightbox(p.src);
        grid.appendChild(div);
      });
    });

  function openLightbox(src) {
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.getElementById('lightbox-img').src = '';
    document.body.style.overflow = '';
  }

  document.getElementById('lightbox').addEventListener('click', function(e) {
    if (e.target === this) closeLightbox();
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeLightbox();
  });
</script>


</body>
</html>
